services:
  - type: web
    name: signlearn-api
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: signlearn-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: http://localhost:5173
      - key: CORS_ALLOW_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173

databases:
  - name: signlearn-db
    plan: free
    databaseName: signlearn
    user: signlearn
